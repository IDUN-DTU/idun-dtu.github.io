<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TissueSW Scanner</title>
    <style>
        :root {
            --bg: #0f172a;
            --surface: #1e293b;
            --text: #f8fafc;
            --primary: #3b82f6;
            --danger: #ef4444;
            --success: #10b981;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 2rem 1.5rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .logo {
            width: 150px;
            margin-bottom: 1.5rem;
            border-radius: 8px;
            display: block;
        }

        h1 {
            font-size: 1.5rem;
            margin-bottom: 0.5rem;
            text-align: center;
        }

        .sample-id {
            background-color: var(--surface);
            padding: 1rem 1.5rem;
            border-radius: 8px;
            font-family: monospace;
            font-size: 1.25rem;
            color: var(--primary);
            margin-bottom: 2rem;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .input-group {
            width: 100%;
            max-width: 320px;
            margin-bottom: 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .input-group label {
            font-size: 0.95rem;
            color: #94a3b8;
            font-weight: 500;
        }

        .input-field {
            padding: 0.85rem 1rem;
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            background-color: var(--bg);
            color: var(--text);
            font-size: 1.1rem;
        }

        .input-field:focus {
            outline: none;
            border-color: var(--primary);
        }

        .info {
            color: #94a3b8;
            text-align: center;
            margin-bottom: 2rem;
            font-size: 0.95rem;
            max-width: 300px;
        }

        .btn-container {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            width: 100%;
            max-width: 320px;
        }

        .btn {
            display: block;
            width: 100%;
            padding: 1rem;
            border-radius: 12px;
            border: none;
            font-size: 1.1rem;
            font-weight: 600;
            text-align: center;
            text-decoration: none;
            cursor: pointer;
            transition: transform 0.1s;
        }

        .btn:active {
            transform: scale(0.98);
        }

        .btn-checkout {
            background-color: var(--primary);
            color: white;
        }

        .btn-dispose {
            background-color: transparent;
            color: var(--danger);
            border: 2px solid var(--danger);
        }

        #error-msg {
            color: var(--danger);
            font-weight: bold;
            display: none;
            text-align: center;
            margin-top: 2rem;
        }
    </style>
</head>

<body>

    <div id="content" style="display: none; width: 100%; align-items: center; flex-direction: column;">
        <img src="assets/idun_logo.jpg" alt="Idun Logo" class="logo" />
        <h1>Tissue Sample Management</h1>

        <div class="sample-id" id="sample-id-display"></div>

        <div class="input-group">
            <label for="user-initials">Your Initials</label>
            <input type="text" id="user-initials" class="input-field" placeholder="e.g. JD" required />
        </div>

        <p class="info">Please select an action below. This will open your mail app to send an automated status update.
        </p>

        <div class="btn-container">
            <button id="btn-checkout" class="btn btn-checkout">Check Out Sample</button>
            <button id="btn-dispose" class="btn btn-dispose">Dispose Sample</button>
        </div>
    </div>

    <div id="error-msg">
        Error: No sample ID provided in the URL.
    </div>

    <script>
        // Use a dedicated receiver email for the lab system
        const RECEIVER_EMAIL = "iduntissuemanager@pm.me";

        document.addEventListener("DOMContentLoaded", () => {
            const params = new URLSearchParams(window.location.search);
            const sampleId = params.get('id');

            if (!sampleId) {
                document.getElementById('error-msg').style.display = 'block';
                return;
            }

            document.getElementById('content').style.display = 'flex';
            document.getElementById('sample-id-display').innerText = sampleId;

            const checkoutBtn = document.getElementById('btn-checkout');
            const disposeBtn = document.getElementById('btn-dispose');
            const initialsInput = document.getElementById('user-initials');

            function getInitials() {
                const val = initialsInput.value.trim();
                if (!val) {
                    alert("Please enter your initials before proceeding.");
                    initialsInput.focus();
                    return null;
                }
                return val;
            }

            checkoutBtn.addEventListener('click', (e) => {
                e.preventDefault();
                const initials = getInitials();
                if (!initials) return;

                const subject = `CHECKOUT:${encodeURIComponent(sampleId)}`;
                const body = `Automated checkout request for ${encodeURIComponent(sampleId)} by ${encodeURIComponent(initials)}.\n\nDo not edit the subject line.`;
                window.location.href = `mailto:${RECEIVER_EMAIL}?subject=${subject}&body=${encodeURIComponent(body)}`;
            });

            disposeBtn.addEventListener('click', (e) => {
                e.preventDefault();
                const initials = getInitials();
                if (!initials) return;

                const subject = `DISPOSAL:${encodeURIComponent(sampleId)}`;
                const body = `Automated disposal request for ${encodeURIComponent(sampleId)} by ${encodeURIComponent(initials)}.\n\nDo not edit the subject line.`;
                window.location.href = `mailto:${RECEIVER_EMAIL}?subject=${subject}&body=${encodeURIComponent(body)}`;
            });
        });
    </script>
</body>

</html>
